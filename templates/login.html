{% extends 'base.html' %}

{% block content %}

<h2>Вхід</h2>

{% if error %}
<p>
    {{ error }}
</p>
{% endif %}

<form method="post">

    {% csrf_token %}

    <label>Логін</label>

    <input
        type="text"
        name="username"
        required
    >

    <label>Пароль</label>

    <input
        type="password"
        name="password"
        required
    >

    <button type="submit">
        Увійти
    </button>

</form>

<p>
    Немає акаунта?
    <a href="/register/">Реєстрація</a>
</p>

{% endblock %}
